<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Informace o čísle | TKM</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #eef2f7;
  color: #172033;
}

.topbar {
  background: linear-gradient(135deg, #0d47a1, #08306b);
  color: white;
  min-height: 86px;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 18px 24px;
  font-size: 25px;
  font-weight: bold;
  box-shadow: 0 3px 12px rgba(0,0,0,0.25);
}

.container {
  max-width: 1000px;
  margin: 32px auto;
  padding: 0 20px;
}

.card {
  background: white;
  border-radius: 12px;
  box-shadow: 0 4px 18px rgba(0,0,0,0.10);
  overflow: hidden;
  margin-bottom: 26px;
}

.card-header {
  padding: 24px 28px;
  border-bottom: 1px solid #e0e6ef;
}

.card-header p {
  margin: 0 0 8px;
  color: #667085;
  font-size: 15px;
}

.card-header h1 {
  margin: 0;
  font-size: 30px;
  color: #0d47a1;
}

.info-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 18px;
  padding: 26px 28px;
}

.info-box {
  background: #f7f9fc;
  border: 1px solid #e0e6ef;
  border-radius: 10px;
  padding: 18px;
}

.info-box small {
  display: block;
  color: #667085;
  margin-bottom: 8px;
  font-size: 14px;
}

.info-box strong {
  font-size: 20px;
  color: #172033;
}

.info-box.full {
  grid-column: 1 / -1;
}

.person-link {
  color: #0d47a1;
  text-decoration: none;
  font-weight: bold;
}

.person-link:hover {
  text-decoration: underline;
}

.status {
  display: inline-block;
  background: #e8f5e9;
  color: #2e7d32;
  border: 1px solid #c8e6c9;
  padding: 7px 12px;
  border-radius: 999px;
  font-weight: bold;
  font-size: 14px;
}

.back {
  display: inline-block;
  margin-top: 10px;
  background: white;
  color: #0d47a1;
  border: 1px solid #c7d7ef;
  padding: 12px 18px;
  border-radius: 8px;
  text-decoration: none;
  font-weight: bold;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}

.back:hover {
  background: #f1f6ff;
}

@media (max-width: 700px) {
  .info-grid {
    grid-template-columns: 1fr;
  }

  .card-header h1 {
    font-size: 25px;
  }

  .topbar {
    font-size: 20px;
  }
}
</style>
</head>

<body>

<div class="topbar">
  TKM - Telekomunikační modul telefonních čísel a hovorů
</div>

<div class="container">

  <div class="card">
    <div class="card-header">
      <p>Informace o telefonním čísle</p>
      <h1>603 194 3788</h1>
    </div>

    <div class="info-grid">
      <div class="info-box">
        <small>Operátor</small>
        <strong>D-Mobile</strong>
      </div>

      <div class="info-box">
        <small>Typ</small>
        <strong>Předplacená karta</strong>
      </div>

      <div class="info-box">
        <small>Aktivace</small>
        <strong>16.8.2004</strong>
      </div>

      <div class="info-box">
        <small>Registrovaný uživatel</small>
        <span class="status">ANO</span>
      </div>

      <div class="info-box">
        <small>Jméno</small>
        <strong>
          <a class="person-link" href="bohuslavanemcova6031943788n.html">
            Bohuslava Němcová
          </a>
        </strong>
      </div>

      <div class="info-box full">
        <small>Adresa</small>
        <strong>Lužická 1081/15, Praha 2</strong>
      </div>
    </div>
  </div>

  <a class="back" href="6031943788n.html">
    ← Zpět na výpis hovorů telefonního čísla 603 194 3788
  </a>

</div>

</body>
</html>
