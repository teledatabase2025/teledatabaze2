<!DOCTYPE html>
<html lang="cs">

<title>Informace o čísle | TKM</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: "Segoe UI", Arial, sans-serif;
  background: #eef2f7;
  color: #172033;
}

.topbar {
  background: linear-gradient(135deg, #0d47a1, #08306b);
  color: white;
  min-height: 86px;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 18px 24px;
  font-size: 25px;
  font-weight: bold;
  box-shadow: 0 3px 12px rgba(0,0,0,0.25);
}

.container {
  max-width: 1000px;
  margin: 32px auto;
  padding: 0 20px;
}

.card {
  background: white;
  border-radius: 12px;
  box-shadow: 0 4px 18px rgba(0,0,0,0.10);
  overflow: hidden;
  margin-bottom: 26px;
  transition: transform 0.2s ease, box-shadow 0.2s ease;
}

.card:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(0,0,0,0.12);
}

.card-header {
  padding: 24px 28px;
  border-bottom: 1px solid #e0e6ef;
}

.card-header p {
  margin: 0 0 8px;
  color: #667085;
  font-size: 15px;
}

.card-header h1 {
  margin: 0;
  font-size: 30px;
  color: #0d47a1;
}

.info-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 18px;
  padding: 26px 28px;
}

.info-box {
  background: #f7f9fc;
  border: 1px solid #e0e6ef;
  border-radius: 10px;
  padding: 18px;
}

.info-box small {
  display: block;
  color: #667085;
  margin-bottom: 8px;
  font-size: 14px;
}

.info-box strong {
  font-size: 20px;
  color: #172033;
}

.info-box.full {
  grid-column: 1 / -1;
}

.status {
  display: inline-block;
  background: #e8f5e9;
  color: #2e7d32;
  border: 1px solid #c8e6c9;
  padding: 7px 12px;
  border-radius: 999px;
  font-weight: bold;
  font-size: 14px;
}

.back {
  display: inline-block;
  margin-top: 10px;
  background: white;
  color: #0d47a1;
  border: 1px solid #c7d7ef;
  padding: 12px 18px;
  border-radius: 8px;
  text-decoration: none;
  font-weight: bold;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}

.back:hover {
  background: #f1f6ff;
}

@media (max-width: 700px) {
  .info-grid {
    grid-template-columns: 1fr;
  }

  .card-header h1 {
    font-size: 25px;
  }

  .topbar {
    font-size: 20px;
  }
}
</style>
</head>

<body>

      </div>
