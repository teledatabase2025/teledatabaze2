<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Přihlášení do interní databáze</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #eeeeee;
}

.login-box {
  background: white;
  max-width: 420px;
  margin: 100px auto;
  padding: 30px;
  border-radius: 8px;
  box-shadow: 0 2px 12px rgba(0,0,0,.25);
}

h1 {
  color: #b71c1c;
  text-align: center;
  margin-bottom: 10px;
}

p {
  text-align: center;
  color: #555;
}

input {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  font-size: 16px;
  border: 1px solid #ccc;
  border-radius: 6px;
  box-sizing: border-box;
}

button {
  width: 100%;
  padding: 12px;
  background: #b71c1c;
  color: white;
  border: none;
  border-radius: 6px;
  font-size: 16px;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  background: #7f0000;
}

.error {
  color: #b71c1c;
  text-align: center;
  margin-top: 15px;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="login-box">

  <h1>Interní databáze</h1>
  <p>Přístup pouze pro oprávněné uživatele.</p>

  <form onsubmit="loginUser(); return false;">

    <input
      type="text"
      id="login"
      placeholder="Uživatelské jméno (ID)"
      required
    >

    <input
      type="password"
      id="password"
      placeholder="Heslo"
      required
    >

    <button type="submit">
      Přihlásit se
    </button>

  </form>

  <div class="error" id="error"></div>

</div>

<script>
function loginUser() {

  const login = document.getElementById("login").value;

  // převede heslo na VELKÁ písmena
  const password = document
    .getElementById("password")
    .value
    .toUpperCase();

  if (
    login === "145416" &&
    (
      password === "AMÁLKA" ||
      password === "AMALKA"
    )
  ) {

    sessionStorage.setItem("loggedIn", "true");

    window.location.href = "lokalizace.html";

  } else {

    document.getElementById("error").innerText =
      "Neplatné přihlašovací údaje.";

  }
}
</script>

</body>
</html>
