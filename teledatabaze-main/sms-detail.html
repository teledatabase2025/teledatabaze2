<!DOCTYPE html>
<html lang="cs"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>TEXT SMS | TKM</title><link rel="stylesheet" href="tkm-new.css"><style>
.detail-wrap{max-width:900px}.sms-content{padding:30px 28px}.sms-meta-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:22px}.meta-item{background:#f7f9fc;border:1px solid #e0e6ef;border-radius:8px;padding:12px 14px}.meta-item small{display:block;color:#667085;margin-bottom:5px}.message-box{white-space:pre-line;background:#f7f9fc;border:1px solid #e0e6ef;border-left:5px solid #0d47a1;border-radius:10px;padding:24px;font-size:21px;line-height:1.65}.report-corner{position:fixed;right:20px;bottom:18px;z-index:20}.report-corner button{max-width:330px;background:#b71c1c;color:#fff;border:0;border-radius:9px;padding:13px 18px;box-shadow:0 3px 12px rgba(0,0,0,.28);font-weight:800;cursor:pointer}.report-corner button:hover{background:#7f0000}.result-note{display:none;margin-top:18px;border-left:5px solid #b71c1c;background:#fff5f5;padding:14px 17px;border-radius:7px;font-weight:700}@media(max-width:600px){.sms-meta-grid{grid-template-columns:1fr}.report-corner{left:14px;right:14px}.report-corner button{width:100%;max-width:none}}
</style></head><body><div class="topbar">TKM - Telekomunikační modul telefonních čísel a hovorů</div><div class="container detail-wrap">
<div class="card"><div class="card-header"><p>Detail textové zprávy</p><h1>TEXT SMS</h1></div><div class="sms-content"><div class="sms-meta-grid" id="meta"></div><div class="message-box" id="message"></div><div class="result-note" id="resultNote"></div></div></div><a class="back" id="backLink" href="index.html">← Zpět na výpis</a></div>
<div class="report-corner"><button id="reportButton" type="button">Nahlásit podezřelou SMS</button></div>
<div class="modal-backdrop" id="normalModal"><div class="modal"><div class="modal-head">Vyhodnocení SMS</div><div class="modal-body">Tato zpráva nebyla vyhodnocena jako podezřelá.</div><div class="modal-actions"><button class="modal-close" type="button">Zavřít</button></div></div></div>
<script src="tkm-data.js"></script><script>
const id=new URLSearchParams(location.search).get('id');const m=window.TKM_DATA.messages.find(x=>x.id===id);const meta=document.getElementById('meta');const msg=document.getElementById('message');const back=document.getElementById('backLink');const report=document.getElementById('reportButton');const normal=document.getElementById('normalModal');
if(!m){document.querySelector('.card').innerHTML='<div class="card-header"><h1>Zpráva nebyla nalezena</h1></div>';report.style.display='none';}
else{meta.innerHTML=`<div class="meta-item"><small>Datum a čas</small><strong>${m.date}, ${m.time}</strong></div><div class="meta-item"><small>Typ zprávy</small><strong>${m.direction} SMS</strong></div><div class="meta-item"><small>Telefonní číslo</small><strong>${m.otherNumber}</strong></div><div class="meta-item"><small>ID zprávy</small><strong>${m.recordId}</strong></div>`;msg.textContent='„'+m.text+'“';back.href=m.backFile;back.textContent='← Zpět na výpis hovorů a SMS čísla '+m.ownerNumber;}
let armed=false;report.addEventListener('click',()=>{if(!m)return;if(!m.suspicious){normal.classList.add('open');return;}if(!armed){armed=true;report.textContent='LOKALIZOVAT osobu v době 21:30 a později toho dne';const note=document.getElementById('resultNote');note.style.display='block';note.textContent='Zpráva byla vyhodnocena jako podezřelá. Je dostupná mimořádná lokalizace zařízení pro časové období po 21:30.';}else{location.href='lokalizace-swingers.html?osoba='+encodeURIComponent(m.owner);}});normal.addEventListener('click',e=>{if(e.target===normal||e.target.classList.contains('modal-close'))normal.classList.remove('open')});
</script></body></html>
